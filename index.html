<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CityReport</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#132a13">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>City<span class="text-accent">Report</span></h1>
            <div id="offline-badge" class="d-none"><i data-lucide="wifi-off"></i></div>
        </div>
    </header>

    <div class="content">
        <div id="camera-placeholder">
            <i data-lucide="camera" size="26"></i>
            <p>Zrób zdjęcie zgłoszenia</p>
        </div>
        <div id="photo-preview-container" class="d-none">
            <img id="photo-preview" src="" alt="Podgląd" class="preview-img">
        </div>
        <div id="map-section" class="d-none">
            <p id="coords-text"></p>
            <div id="map"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <label for="camera-input" id="camera-btn-label" class="btn">
            <i data-lucide="camera" size="20"></i>
            <span>Zrób zdjęcie</span>
        </label>
        <input type="file" id="camera-input" accept="image/*" capture="camera" class="d-none">

        <div id="share-section" class="d-none">
            <button id="share-btn" class="btn">
                <i data-lucide="share-2" size="20"></i>
                <span>Udostępnij</span>
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
