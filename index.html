<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityReport</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div id="nagłówek">
        <h1>CityReport</h1>
    </div>
    <div class="content">
        <div id="camera-placeholder">
            <p>Zrób zdjęcie, aby kontynuować</p>
        </div>
        <div id="photo-preview-container" class="d-none">
            <img id="photo-preview" src="" alt="Podgląd" class="img-fluid rounded">
        </div>
        <div id="map-section" class="d-none">
            <p id="coords-text"></p>
            <div id="map"></div>
        </div>
    </div>
    <div class="bottom-bar">
        <label for="camera-input" class="btn">
            <i data-lucide="camera" size="20"></i>
            <span>Zrób zdjęcie</span>
        </label>
        <input type="file" id="camera-input" accept="image/*" capture="camera" class="d-none">
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
